services:
  - type: web
    name: ai-job-tracker
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_VERSION
        value: 22.20.0
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: require
      - key: DATABASE_POOL_MAX
        value: "8"
      - key: DATABASE_CONNECT_TIMEOUT_MS
        value: "60000"
      - key: DATABASE_IDLE_TIMEOUT_MS
        value: "30000"
      - key: DATABASE_QUERY_TIMEOUT_MS
        value: "60000"
      - key: DATABASE_STATEMENT_TIMEOUT_MS
        value: "60000"
      - key: DATABASE_STARTUP_RETRIES
        value: "5"
      - key: DATABASE_STARTUP_RETRY_DELAY_MS
        value: "5000"
      - key: BACKGROUND_JOBS_FIRST_RUN_DELAY_MS
        value: "180000"
      - key: BACKGROUND_JOBS_INTERVAL_MS
        value: "3600000"
      - key: PERSISTED_JOB_LIMIT
        value: "2000"
      - key: PERSISTED_SCAN_RUN_LIMIT
        value: "8"
      - key: PERSISTED_SCAN_CALL_LIMIT
        value: "25"
      - key: JOB_DETAIL_CACHE_LIMIT
        value: "250"
      - key: JOB_DETAIL_CACHE_CONTENT_LIMIT
        value: "3000"
      - key: PUBLIC_APP_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_SUMMARY_MODEL
        value: gpt-5-nano
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
