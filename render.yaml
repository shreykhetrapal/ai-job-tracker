services:
  - type: web
    name: ai-job-tracker
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_VERSION
        value: 24.14.1
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: require
      - key: DATABASE_POOL_MAX
        value: "8"
      - key: PUBLIC_APP_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_SUMMARY_MODEL
        value: gpt-5-nano
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
